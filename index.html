<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="discription" content="Billing website">
    <title>Maligai shope | billing website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <nav>
        <div>
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar scroll</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarScroll">
      <ul class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll" style="--bs-scroll-height: 100px;">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Link
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Action</a></li>
            <li><a class="dropdown-item" href="#">Another action</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#">Something else here</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled" aria-disabled="true">Link</a>
        </li>
      </ul>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>

        </div>
    </nav>

    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <h5 class="mb-0">To-Do List</h5>
                        <span class="text-body-secondary small"></span>
                    </div>
                    <div class="card-body">
                        <form id="task-form" class="row g-3">
                            <div class="col-12 col-md-8">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="task-input" placeholder="Task">
                                    <label for="task-input">Task</label>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <select id="priority-input" class="form-select">
                                    <option value="normal" selected>Priority: Normal</option>
                                    <option value="high">Priority: High</option>
                                    <option value="low">Priority: Low</option>
                                </select>
                            </div>
                            <div class="col-6 col-md-12 d-grid d-md-flex gap-2">
                                <button type="submit" class="btn btn-primary">Add Task</button>
                                <button type="button" id="clear-completed" class="btn btn-outline-secondary">Clear Completed</button>
                            </div>
                        </form>
                        <div id="feedback" class="mt-3 d-none">
                            <div class="alert alert-danger mb-0" role="alert"></div>
                        </div>
                    </div>
                    <ul id="task-list" class="list-group list-group-flush"></ul>
                    <div class="card-footer d-flex justify-content-between align-items-center">
                        <div class="small text-body-secondary">
                            <span id="tasks-count">0</span> tasks
                        </div>
                        <div class="btn-group btn-group-sm" role="group" aria-label="Filters">
                            <button type="button" class="btn btn-outline-secondary active" data-filter="all">All</button>
                            <button type="button" class="btn btn-outline-secondary" data-filter="active">Active</button>
                            <button type="button" class="btn btn-outline-secondary" data-filter="completed">Completed</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
